<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile – Veritas AI</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="animated-bg"></div>
  <div class="grid-overlay"></div>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <div class="brand-icon"></div>
      <span>Veritas AI</span>
    </a>
    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="analyze.html">Analyze</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
    </ul>
    <div class="nav-actions" id="nav-actions">
      <!-- Filled by app.js -->
    </div>
    <button class="mobile-menu-btn" id="mobile-menu-btn">&#9776;</button>
  </nav>

  <!-- Profile Page -->
  <main class="page-wrapper dashboard-page">
    <div class="container container-md">
      
      <!-- Profile Header / Overview -->
      <div class="card profile-card mb-8 animate-fade-in-down">
        <div class="profile-avatar-wrapper">
          <div class="profile-avatar" id="prof-avatar-letter">U</div>
          <div class="avatar-upload-btn" onclick="triggerAvatarUpload()" title="Upload Profile Photo">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          </div>
        </div>
        <div class="profile-details">
          <h2 id="prof-display-name">Loading Profile...</h2>
          <p id="prof-email-text">user@example.com</p>
          <div class="flex gap-4 mt-3 flex-wrap">
            <span class="badge badge-info" id="prof-joined-date">Joined: Jan 2026</span>
            <span class="badge badge-success" id="prof-stats-accuracy">Accuracy: 95.8%</span>
            <span class="badge badge-neutral" id="prof-stats-count">0 Analyses Run</span>
          </div>
        </div>
      </div>

      <!-- Settings Forms -->
      <div class="card animate-fade-in-up delay-1">
        <h3 class="text-lg font-bold mb-6">Account Settings</h3>
        
        <form class="auth-form" id="profile-edit-form" style="gap: var(--space-4);">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="prof-fullname">Full Name</label>
              <input type="text" id="prof-fullname" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="prof-username">Username</label>
              <input type="text" id="prof-username" class="form-input" required disabled style="opacity: 0.6; cursor: not-allowed;">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="prof-email">Email Address</label>
              <input type="email" id="prof-email" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="prof-mobile">Mobile Number</label>
              <input type="tel" id="prof-mobile" class="form-input" required>
            </div>
          </div>

          <!-- Notification Preferences Checklist -->
          <div style="margin: var(--space-4) 0; padding-top: var(--space-4); border-top: 1px solid var(--border-secondary);">
            <h4 class="text-sm font-semibold mb-3">Notification Preferences</h4>
            <div class="flex flex-col gap-2">
              <label class="form-checkbox">
                <input type="checkbox" id="pref-completed" checked> Email alert on verification completions
              </label>
              <label class="form-checkbox">
                <input type="checkbox" id="pref-system" checked> System notifications for new models updates
              </label>
              <label class="form-checkbox">
                <input type="checkbox" id="pref-security" checked> Alert on new session logs or password changes
              </label>
            </div>
          </div>

          <!-- Actions -->
          <div class="flex justify-end gap-3" style="border-top: 1px solid var(--border-secondary); padding-top: var(--space-4);">
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </div>
        </form>
      </div>

    </div>
  </main>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Ensure user is logged in
      const currentUser = AppState.getCurrentUser();
      if (!currentUser) {
        window.location.href = 'login.html';
        return;
      }

      // Populate details
      document.getElementById('prof-avatar-letter').innerText = currentUser.fullName.split(' ').map(n=>n[0]).join('');
      document.getElementById('prof-display-name').innerText = currentUser.fullName;
      document.getElementById('prof-email-text').innerText = currentUser.email;
      document.getElementById('prof-joined-date').innerText = `Joined: ${currentUser.joinedDate}`;
      document.getElementById('prof-stats-accuracy').innerText = `Est. Accuracy: ${currentUser.accuracy || '100'}%`;
      document.getElementById('prof-stats-count').innerText = `${currentUser.analysesCount || '0'} Analyses Run`;

      // Fill Input fields
      document.getElementById('prof-fullname').value = currentUser.fullName;
      document.getElementById('prof-username').value = currentUser.username;
      document.getElementById('prof-email').value = currentUser.email;
      document.getElementById('prof-mobile').value = currentUser.mobile || '';

      // Handle Edit form saves
      const editForm = document.getElementById('profile-edit-form');
      editForm.addEventListener('submit', (e) => {
        e.preventDefault();

        const updatedName = document.getElementById('prof-fullname').value.trim();
        const updatedEmail = document.getElementById('prof-email').value.trim().toLowerCase();
        const updatedMobile = document.getElementById('prof-mobile').value.trim();

        // Save back into mock databases
        const usersList = AppState.getUsers();
        const activeIdx = usersList.findIndex(u => u.username === currentUser.username);
        
        if (activeIdx !== -1) {
          usersList[activeIdx].fullName = updatedName;
          usersList[activeIdx].email = updatedEmail;
          usersList[activeIdx].mobile = updatedMobile;
          
          AppState.setUsers(usersList);
          
          // Update current session payload
          AppState.setCurrentUser(usersList[activeIdx]);

          Toast.show('Profile Saved', 'Personal information details updated successfully.', 'success');
          
          // Reload fields
          setTimeout(() => {
            window.location.reload();
          }, 800);
        }
      });
    });

    window.triggerAvatarUpload = function() {
      alert('Mock Avatar Upload: Choose file dialog activated. Image uploaded successfully.');
      Toast.show('Avatar Uploaded', 'Updated profile picture settings.', 'success');
    };
  </script>
  <script src="js/chatbot.js"></script>
</body>
</html>
